# Optional sidecar: nginx in front of Graylog that strips X-Frame-Options
# so the mobile-app's WebView can iframe the dashboard at /dashboards/<id>.
#
# Graylog 7 unconditionally sends `X-Frame-Options: DENY` from its embedded
# Jetty server and does not expose a config flag to disable it. Sitting it
# behind nginx with `proxy_hide_header X-Frame-Options` lets the Cordova
# WebView load `<NGINX_BASE>/dashboards/<id>` inside the Seller Comparison
# overlay (see mobile-app/www/js/app.js:openCommonDashboard).
#
# To use:
#   1. docker run --rm -d --name graylog-fwd --network tok-scrape-net \
#        -p 9001:9001 -v $PWD/graylog-branding/nginx-frame-strip.conf:/etc/nginx/conf.d/default.conf \
#        nginx:1.27
#   2. Point GRAYLOG_URL at http://<host>:9001 when invoking
#      `npm --prefix mobile-app run build:preloaded`.
#
# Without this (or an equivalent change), the iframe will load but render
# blank with `X-Frame-Options: DENY` in the WebView console. The rest of
# the per-member preload (auto-login, scoped dashboard) still works -- only
# the embedded common-dashboard view requires the framing relaxation.

server {
    listen 9001;
    server_name _;

    # The actual Graylog service. Adjust hostname/port for your network.
    set $upstream_graylog http://graylog:9000;

    location / {
        proxy_pass $upstream_graylog;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Graylog-Server-URL http://$host:$server_port/;

        # Strip Graylog's X-Frame-Options: DENY so the Cordova WebView can
        # iframe the dashboard. Replace SAMEORIGIN/DENY with ALLOWALL --
        # the latter is non-standard but accepted by Chromium/WebView.
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options ALLOWALL always;

        # Optional: relax CSP frame-ancestors for newer browsers that
        # honor it instead of the legacy header. Graylog doesn't currently
        # set frame-ancestors, but if it starts to we'll need this.
        proxy_hide_header Content-Security-Policy;
    }
}
