# Graylog local stack for the TikTok Shop metrics bookmarklet.
#
# Usage (from this folder):
#   # Put your ngrok authtoken in .env (or export it), then:
#   #   NGROK_AUTHTOKEN=2abc...xyz  <-- .env
#   docker compose up
#
#   # The `bootstrap` service runs last; once it finishes it prints the
#   # public Graylog URL and an API token for the mobile app. If you ran
#   # with `-d`, fetch the banner with:
#   #   docker compose logs bootstrap
#   #
#   # Web UI (local LAN): http://localhost:9000   (login: admin / ChangeMeAdmin!)
#   #
#   # Create input:  System -> Inputs -> GELF HTTP -> Launch new input
#   #   Bind address 0.0.0.0, Port 12202, Enable CORS.
#   #
#   # Sanity check from the host:
#   #   curl -v -XPOST http://localhost:12202/gelf \
#   #     -H 'Content-Type: application/json' \
#   #     -d '{"version":"1.1","host":"test","short_message":"hello graylog"}'
#
# Tear down (keeps volumes):
#   docker compose down
# Full reset (deletes logs, indices, Mongo data):
#   docker compose down -v
#
# To change the admin password: set GRAYLOG_ROOT_PASSWORD_SHA2 below to
#   echo -n 'YourNewPassword' | sha256sum

services:
  mongodb:
    image: mongo:7.0
    container_name: graylog-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: graylog-opensearch
    restart: unless-stopped
    environment:
      - cluster.name=graylog
      - node.name=opensearch
      - discovery.type=single-node
      - action.auto_create_index=false
      # Use the image's own env vars to disable security (they become -E flags
      # internally). Do NOT also pass `plugins.security.disabled=true` — OpenSearch
      # rejects duplicate -E args with "setting already set".
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      # Required env var in OpenSearch 2.12+ even when security is disabled
      # (the startup script checks for it before it reads the disable flag).
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Gr@yl0g-Admin-ChangeMe!
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      # Use wait_for_status=yellow so a single-node cluster is considered healthy
      # (single-node with 1 replica sits yellow, never green).
      test:
        [
          "CMD-SHELL",
          "curl -sf 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s' >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  graylog:
    build:
      context: ./graylog-branding
      dockerfile: Dockerfile
    image: tok-scrape/graylog:7.0.6-lp
    container_name: graylog
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      # 96-char random string. Regenerate for anything non-local:
      #   pwgen -N 1 -s 96   (or: openssl rand -hex 48)
      GRAYLOG_PASSWORD_SECRET: "replace-this-with-a-random-96-char-string-replace-this-with-a-random-96-char-string12"
      # sha256 of the admin password. Default here is "ChangeMeAdmin!".
      # To change: echo -n 'YourNewPassword' | sha256sum
      GRAYLOG_ROOT_PASSWORD_SHA2: "8c2ec2d74710b0e444124a10302bfb2374df38f39c8616d7068daf9ca7ae1a94"
      GRAYLOG_HTTP_BIND_ADDRESS: "0.0.0.0:9000"
      GRAYLOG_HTTP_EXTERNAL_URI: "http://localhost:9000/"
      # Allow the Cordova mobile app's WebView to call the REST API. The app
      # loads from https://localhost or file:// and would otherwise be blocked
      # by the same-origin policy. Tighten in production.
      GRAYLOG_HTTP_ENABLE_CORS: "true"
      GRAYLOG_HTTP_CORS_ALLOW_ORIGIN: "*"
      GRAYLOG_MONGODB_URI: "mongodb://mongodb:27017/graylog"
      GRAYLOG_ELASTICSEARCH_HOSTS: "http://opensearch:9200"
      # Do NOT pin GRAYLOG_ELASTICSEARCH_VERSION — leaving it unset lets Graylog
      # probe and detect OpenSearch 2.x. Forcing "7" makes Graylog send
      # Elasticsearch-7 queries (with a `types` metadata key) that OpenSearch
      # rejects as: "key [types] is not supported in the metadata section".
    ports:
      - "9000:9000"       # Web UI + API
      - "12202:12202"     # GELF HTTP input (create it in the UI on this port)
      - "12201:12201/udp" # GELF UDP (optional, handy for local testing)
      - "1514:1514"       # Syslog TCP (optional)
      - "1514:1514/udp"   # Syslog UDP (optional)
    volumes:
      - graylog_data:/usr/share/graylog/data
      - graylog_journal:/usr/share/graylog/data/journal

  ngrok:
    # Exposes the Graylog REST API publicly so the Cordova mobile app can
    # reach it from a phone outside the LAN. The public URL is assigned on
    # every start (random unless you have a paid reserved domain), so the
    # mobile app's Settings must be updated each time the stack restarts.
    #
    # Requires a free ngrok account: https://dashboard.ngrok.com/signup
    # Grab the authtoken from https://dashboard.ngrok.com/get-started/your-authtoken
    # and put it in a `.env` file next to this compose file (or export it):
    #   NGROK_AUTHTOKEN=2abc...xyz
    image: ngrok/ngrok:3
    container_name: graylog-ngrok
    restart: unless-stopped
    depends_on:
      - graylog
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN:?set NGROK_AUTHTOKEN (see https://dashboard.ngrok.com/get-started/your-authtoken)}"
    # --host-header=rewrite makes ngrok forward with Host: graylog:9000 so
    # Graylog's virtual-host checks (and any reverse-proxy assumptions)
    # don't reject requests whose Host header is the random ngrok subdomain.
    command: ["http", "--host-header=rewrite", "graylog:9000"]
    ports:
      - "4040:4040" # local inspector + API queried by the bootstrap service

  bootstrap:
    # One-shot helper that runs after graylog + ngrok come up. It:
    #   1. Polls the ngrok inspector API for the public https URL.
    #   2. Polls Graylog until the REST API accepts admin auth.
    #   3. Creates (or reuses) a long-lived API token on the admin user.
    #   4. Prints a banner with the public URL + token so you can paste
    #      them into the mobile app's Settings screen.
    #
    # Logic lives inline here (not in a mounted shell script) so Windows
    # CRLF line endings on the host can't break it. The container runs
    # Linux with LF and restarts on failure are disabled.
    image: alpine:3.19
    container_name: graylog-bootstrap
    restart: "no"
    depends_on:
      graylog:
        condition: service_started
      ngrok:
        condition: service_started
    environment:
      GRAYLOG_ADMIN_USER: "admin"
      GRAYLOG_ADMIN_PASSWORD: "ChangeMeAdmin!"
      GRAYLOG_TOKEN_NAME: "mobile-app"
    # Dollar signs that should be shell variables (not compose interpolation)
    # are doubled as `$$`. `jq` and `curl` are installed at run time so we
    # don't need a custom image.
    entrypoint: ["/bin/sh", "-eu", "-c"]
    command:
      - |
        apk add --no-cache curl jq >/dev/null

        echo "[bootstrap] waiting for ngrok tunnel..."
        URL=""
        i=0
        while [ $$i -lt 60 ]; do
          URL=$$(curl -sf http://ngrok:4040/api/tunnels 2>/dev/null \
                 | jq -r '.tunnels[]? | select(.proto=="https") | .public_url' \
                 | head -n1 || true)
          if [ -n "$$URL" ] && [ "$$URL" != "null" ]; then break; fi
          URL=""
          i=$$((i + 1))
          sleep 2
        done
        if [ -z "$$URL" ]; then
          echo "[bootstrap] ngrok tunnel never came up - see 'docker compose logs ngrok'" >&2
          exit 1
        fi

        echo "[bootstrap] waiting for Graylog API..."
        i=0
        while [ $$i -lt 180 ]; do
          if curl -sf -u "$$GRAYLOG_ADMIN_USER:$$GRAYLOG_ADMIN_PASSWORD" \
               -H 'X-Requested-By: bootstrap' \
               http://graylog:9000/api/system/lbstatus >/dev/null 2>&1; then
            break
          fi
          i=$$((i + 1))
          sleep 2
        done

        # Graylog 6+ requires the admin user's UUID (not the username) in the
        # token endpoint path, so look it up first.
        USER_JSON=$$(curl -s -u "$$GRAYLOG_ADMIN_USER:$$GRAYLOG_ADMIN_PASSWORD" \
                      -H 'X-Requested-By: bootstrap' \
                      "http://graylog:9000/api/users/$$GRAYLOG_ADMIN_USER" || true)
        USER_ID=$$(echo "$$USER_JSON" | jq -r '.id // empty' 2>/dev/null || true)
        if [ -z "$$USER_ID" ]; then
          echo "[bootstrap] failed to look up admin user id:" >&2
          echo "$$USER_JSON" >&2
          USER_ID="$$GRAYLOG_ADMIN_USER"   # fall back; may still work on older versions
        fi

        echo "[bootstrap] creating API token '$$GRAYLOG_TOKEN_NAME' for user $$USER_ID..."
        CREATE_BODY=$$(curl -s -o /tmp/gl_create.json -w '%{http_code}' \
                        -u "$$GRAYLOG_ADMIN_USER:$$GRAYLOG_ADMIN_PASSWORD" \
                        -H 'X-Requested-By: bootstrap' \
                        -H 'Content-Type: application/json' \
                        -X POST "http://graylog:9000/api/users/$$USER_ID/tokens/$$GRAYLOG_TOKEN_NAME" \
                        -d '{"token_ttl":"P90D"}' || true)
        TOKEN=""
        if [ "$$CREATE_BODY" = "200" ] || [ "$$CREATE_BODY" = "201" ]; then
          TOKEN=$$(jq -r '.token // empty' </tmp/gl_create.json 2>/dev/null || true)
        else
          echo "[bootstrap] token POST returned HTTP $$CREATE_BODY:" >&2
          cat /tmp/gl_create.json >&2 || true
          echo >&2
        fi

        if [ -z "$$TOKEN" ]; then
          # Token with that name may already exist — list them and pick it out.
          LIST_JSON=$$(curl -s -u "$$GRAYLOG_ADMIN_USER:$$GRAYLOG_ADMIN_PASSWORD" \
                        -H 'X-Requested-By: bootstrap' \
                        "http://graylog:9000/api/users/$$USER_ID/tokens" || true)
          TOKEN=$$(echo "$$LIST_JSON" \
                   | jq -r ".tokens[]? | select(.name==\"$$GRAYLOG_TOKEN_NAME\") | .token" \
                   | head -n1)
          if [ -z "$$TOKEN" ] && [ -n "$$LIST_JSON" ]; then
            echo "[bootstrap] existing tokens list:" >&2
            echo "$$LIST_JSON" >&2
          fi
        fi
        rm -f /tmp/gl_create.json

        printf '\n'
        printf '=====================================================\n'
        printf ' TokScrape / Graylog is up.\n'
        printf ' Paste these into the mobile app Settings screen:\n'
        printf '=====================================================\n'
        printf '  Graylog URL:   %s\n' "$$URL"
        printf '  API token:     %s\n' "$${TOKEN:-<token creation failed>}"
        printf '  Lucene query:  host:tiktok-bookmarklet\n'
        printf '=====================================================\n'
        printf '\n'
        printf 'Local URLs:\n'
        printf '  Web UI + API:  http://localhost:9000   (login %s / %s)\n' "$$GRAYLOG_ADMIN_USER" "$$GRAYLOG_ADMIN_PASSWORD"
        printf '  GELF HTTP in:  http://localhost:12202/gelf\n\n'

volumes:
  mongodb_data:
  opensearch_data:
  graylog_data:
  graylog_journal:
