<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Member Dashboard V2</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
const { useState, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "badgeMode": "initials",
  "defaultScope": "__all",
  "showPowerDeal": true,
  "showStreak": true,
  "compactVideos": false,
  "accentHue": 28
}/*EDITMODE-END*/;

function scaleKpi(full, weight) {
  // Re-scale All-Accounts sparklines + totals to a single account's weight.
  return {
    value: Math.round(full.value * weight),
    delta: full.delta,
    spark: full.spark.map(v => Math.round(v * weight * 10) / 10),
  };
}

function App() {
  const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);
  const [scope, setScope] = useState(tweaks.defaultScope || '__all');
  const [nav, setNav] = useState('home');

  // Accent hue tweak
  React.useEffect(() => {
    const hue = Number(tweaks.accentHue);
    if (!isNaN(hue)) {
      const color = `oklch(0.68 0.2 ${hue})`;
      document.documentElement.style.setProperty('--primary', color);
      document.documentElement.style.setProperty('--ring', color);
    }
  }, [tweaks.accentHue]);

  // Scope-derived KPIs + filtered data
  const { kpi, products, videos, scopeColor } = useMemo(() => {
    if (scope === '__all') {
      return {
        kpi: KPI_ALL,
        products: PRODUCTS,
        videos: VIDEOS,
        scopeColor: 'var(--primary)',
      };
    }
    const a = acctById(scope);
    const alloc = KPI_BY_ACCT[scope] || { gmv: 0, videos: 0, commission: 0 };
    const gmvW = alloc.gmv / KPI_ALL.gmv.value;
    const vidW = alloc.videos / KPI_ALL.videos.value;
    const comW = alloc.commission / KPI_ALL.commission.value;
    return {
      kpi: {
        gmv:        { value: alloc.gmv,        delta: +0.14, spark: KPI_ALL.gmv.spark.map(v => Math.round(v*gmvW*10)/10) },
        videos:     { value: alloc.videos,     delta: +0.09, spark: KPI_ALL.videos.spark.map(v => Math.round(v*vidW*10)/10) },
        commission: { value: alloc.commission, delta: +0.17, spark: KPI_ALL.commission.spark.map(v => Math.round(v*comW*10)/10) },
      },
      products: PRODUCTS.filter(p => p.accounts.includes(scope)),
      videos:   VIDEOS.filter(v => v.accounts.includes(scope)),
      scopeColor: a.color,
    };
  }, [scope]);

  return (
    <>
      <Topbar />

      <main className="page">
        <div className="acct-bar">
          <AccountSelector selected={scope} onSelect={setScope} />
          <div className="seg">
            <button className="active">7d</button>
            <button>30d</button>
            <button>90d</button>
            <button>All</button>
          </div>
        </div>

        {tweaks.showStreak && <StreakRow />}

        <KpiTiles kpi={kpi} scopeColor={scopeColor} />

        {tweaks.showPowerDeal && <PowerDeal badgeMode={tweaks.badgeMode} />}

        <ProductsTable
          products={products}
          scope={scope}
          badgeMode={tweaks.badgeMode}
        />

        <VideosGrid
          videos={videos}
          badgeMode={tweaks.badgeMode}
        />

        {/* Legend of accounts */}
        <section className="section">
          <div className="section-head">
            <h2 className="section-title">Accounts <span className="pill">legend</span></h2>
          </div>
          <div className="legend">
            {ACCOUNTS.map(a => (
              <span key={a.id} className="acct-chip">
                <span className="acct-dot" style={{ background: a.color }} />
                {tweaks.badgeMode === 'symbol' ? a.symbol + ' ' : ''}{a.name}
              </span>
            ))}
          </div>
        </section>
      </main>

      <BottomNav active={nav} onChange={setNav} />

      <TweaksPanel title="Tweaks">
        <TweakSection title="Visual">
          <TweakRadio label="Account badge style" value={tweaks.badgeMode}
            options={[{value:'initials', label:'Initials'}, {value:'symbol', label:'Symbol'}]}
            onChange={v => setTweaks({ badgeMode: v })}
          />
          <TweakSlider label="Accent hue" min={0} max={360} step={1}
            value={tweaks.accentHue}
            onChange={v => setTweaks({ accentHue: v })}
          />
        </TweakSection>
        <TweakSection title="Layout">
          <TweakToggle label="Show streak card" value={tweaks.showStreak} onChange={v => setTweaks({ showStreak: v })} />
          <TweakToggle label="Show power deal" value={tweaks.showPowerDeal} onChange={v => setTweaks({ showPowerDeal: v })} />
        </TweakSection>
        <TweakSection title="Default scope">
          <TweakRadio label="Default on launch" value={tweaks.defaultScope}
            options={[
              { value: '__all',            label: 'All Accounts' },
              { value: 'blackfridaybrian', label: 'Black Friday Brian' },
              { value: 'beautybybri',      label: 'Beauty by Bri' },
            ]}
            onChange={v => setTweaks({ defaultScope: v })}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
