name: Build APK & publish to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/build-apk.yml'
      - 'index.html'
  workflow_dispatch:

# Required for peaceiris/actions-gh-pages to push the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    name: Build Cordova Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Install Cordova
        run: npm install -g cordova@latest

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile-app/config.xml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Add Android platform
        working-directory: mobile-app
        run: cordova platform add android@latest --no-save

      - name: Inject build version
        working-directory: mobile-app
        run: |
          # Tag the APK with the short SHA so the landing page can show it.
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          sed -i "s|version=\"0.1.0\"|version=\"0.1.${GITHUB_RUN_NUMBER}\"|" config.xml
          echo "BUILD_VERSION=0.1.${GITHUB_RUN_NUMBER}+${SHA_SHORT}" >> "$GITHUB_ENV"
          echo "BUILD_SHA=${SHA_SHORT}" >> "$GITHUB_ENV"

      - name: Build debug APK
        working-directory: mobile-app
        run: cordova build android --debug

      - name: Locate APK
        id: locate
        working-directory: mobile-app
        run: |
          APK=$(find platforms/android -type f -name '*-debug.apk' | head -n1)
          if [ -z "$APK" ]; then
            echo "No APK produced!"; exit 1
          fi
          echo "Found APK: $APK"
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      - name: Stage gh-pages output
        run: |
          mkdir -p public
          cp "mobile-app/${{ steps.locate.outputs.apk_path }}" public/app.apk
          # Also publish the bookmarklet page so the same URL hosts both deliverables.
          if [ -f index.html ]; then
            cp index.html public/bookmarklet.html
          fi
          # Simple landing page.
          BUILT_AT=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          APK_BYTES=$(stat -c%s public/app.apk)
          APK_KB=$(( APK_BYTES / 1024 ))
          cat > public/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>TokScrape</title>
            <style>
              :root { color-scheme: dark; }
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 720px; margin: 60px auto; padding: 0 24px; background: #0b1220; color: #e6ecff; }
              h1 { font-size: 28px; }
              a.cta { display: inline-block; padding: 12px 18px; background: #2ddfb1; color: #001a14; border-radius: 8px; text-decoration: none; font-weight: 700; }
              a { color: #2ddfb1; }
              .meta { color: #8aa0c6; font-size: 13px; margin-top: 24px; }
              code { background: #15203a; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
            </style>
          </head>
          <body>
            <h1>TokScrape Dashboard</h1>
            <p>An Android dashboard that visualizes TikTok Shop metrics ingested into Graylog.</p>
            <p><a class="cta" href="app.apk">Download APK</a></p>
            <h2>Bookmarklet</h2>
            <p>The dashboard's data source is a bookmarklet that scrapes TikTok Shop analytics pages. <a href="bookmarklet.html">Open the bookmarklet page</a>.</p>
            <p class="meta">
              Built ${BUILT_AT} from <code>${{ github.sha }}</code> &middot; APK ${APK_KB} KB &middot; v${BUILD_VERSION}
            </p>
          </body>
          </html>
          EOF
          ls -la public/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: public/app.apk
          if-no-files-found: error

      - name: Publish to gh-pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "build: APK ${{ env.BUILD_VERSION }} (${{ env.BUILD_SHA }})"
          # Preserve a CNAME if one is configured at the user/org level.
          # If you need a project-level CNAME, drop a CNAME file into ./public above.
          keep_files: false
